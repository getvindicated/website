name: "i18n: migrate structure"

# Manual trigger only — go to the Actions tab, pick this workflow,
# click "Run workflow". It restructures app/ for locale routing and
# pushes the result to a branch called i18n-scaffold. GitHub will
# then show a "Compare & pull request" banner on that branch — click
# it yourself to open the PR (this avoids needing the org-level
# "Actions can create pull requests" permission).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run migration script
        run: node scripts/migrate-i18n.mjs

      - name: Commit and push to i18n-scaffold branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B i18n-scaffold
          git add -A
          git commit -m "i18n: restructure app/ for locale routing + add scaffold" || echo "Nothing to commit"
          git push --force origin i18n-scaffold
